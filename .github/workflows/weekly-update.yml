name: 每週自動更新新聞週報

# 觸發時機：
#   1) 排程：每週一 UTC 00:30（= 台灣時間週一上午 08:30）自動執行
#   2) 手動：在 GitHub repo 的 Actions 頁籤可以隨時手動觸發一次（workflow_dispatch）
on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write   # 允許 workflow 把產生的資料與網頁 commit 回 repo
  pages: write       # 允許部署到 GitHub Pages
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 呼叫 Claude API 搜尋並產生本週新聞 JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: 將新聞 JSON 套入模板，產生最終網頁
        run: python3 scripts/build_html.py

      - name: 把更新後的資料與網頁 commit 回 repo
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add data/news.json dist/index.html
          git diff --quiet --cached || git commit -m "週報自動更新：$(date -u +'%Y-%m-%d')"
          git push

      - name: 準備 GitHub Pages 用的靜態檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 如果你還沒設定過 GitHub Pages 環境，第一次手動跑完這個 workflow 後，
  # 需要到 repo 的 Settings → Pages → Source 選擇 "GitHub Actions"，
  # 後續每次排程或手動觸發就會自動部署更新。
